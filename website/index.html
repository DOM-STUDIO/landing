<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,follow">
    <title>DOM STUDIO Versions</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f1ea;
            --surface: #fffdf9;
            --text: #201b16;
            --muted: #6c6258;
            --line: rgba(74, 63, 52, 0.12);
            --accent: #c79b69;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-width: 320px;
            font-family: "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(199, 155, 105, 0.18), transparent 32%),
                var(--bg);
        }

        main {
            width: min(760px, calc(100% - 32px));
            margin: 0 auto;
            padding: 72px 0;
        }

        .eyebrow {
            margin: 0 0 12px;
            color: #8f643e;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 16px;
            font-size: clamp(2rem, 6vw, 3.4rem);
            line-height: 1;
        }

        p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.6;
        }

        .version-list {
            display: grid;
            gap: 14px;
            margin: 32px 0 0;
            padding: 0;
            list-style: none;
        }

        .version-list a {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 18px 20px;
            background: rgba(255, 253, 249, 0.86);
            border: 1px solid var(--line);
            border-radius: 20px;
            color: inherit;
            text-decoration: none;
        }

        .version-list strong {
            font-size: 1.02rem;
        }

        .version-list span {
            color: var(--muted);
            text-align: right;
        }

        .version-list a:hover,
        .version-list a:focus-visible {
            border-color: rgba(199, 155, 105, 0.42);
            outline: none;
        }
    </style>
</head>
<body>
    <main>
        <p class="eyebrow">DOM STUDIO</p>
        <h1>Published site versions</h1>
        <p>Choose a version of the static website. New changes are made in new version folders, while older published versions remain accessible.</p>

        <ul class="version-list">
            <li>
                <a href="./v4/">
                    <strong>v2</strong>
                    <span>Current working version</span>
                </a>
            </li>
            <li>
                <a href="./v2/">
                    <strong>v2</strong>
                    <span>Current working version</span>
                </a>
            </li>
            <li>
                <a href="./v1/">
                    <strong>v1</strong>
                    <span>Initial published snapshot</span>
                </a>
            </li>
        </ul>
    </main>
</body>
</html>
